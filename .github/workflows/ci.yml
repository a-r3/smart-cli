name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Add project to Python path
      run: echo "PYTHONPATH=${GITHUB_WORKSPACE}:${PYTHONPATH}" >> $GITHUB_ENV
    
    - name: Run trusted core test suite
      run: |
        python -m pytest \
          tests/test_cli.py \
          tests/test_config.py \
          tests/test_basic.py \
          tests/test_simple_ai_client.py \
          tests/test_mode_surface.py \
          tests/test_workflow_classifier.py \
          tests/test_workflow_summary.py \
          tests/test_workflow_acceptance.py \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --tb=short

    - name: Upload coverage to Codecov (tokenless)
      if: matrix.python-version == '3.9'  
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: smart-cli-coverage
        fail_ci_if_error: true
        verbose: true
        directory: ./
        root_dir: ./
        working-directory: ./
